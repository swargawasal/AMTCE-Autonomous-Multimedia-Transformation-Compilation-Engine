name: AMTCE Runner

on:
  workflow_dispatch:  # Manual trigger anytime
  schedule:
    # Run every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'

jobs:
  run-amtce:
    runs-on: ubuntu-latest
    timeout-minutes: 340  # Slightly under 6 hours to avoid overlap
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # Full history so git push works cleanly
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y ffmpeg

    - name: Install PyTorch (CPU-only)
      run: |
        # GitHub runners have no GPU — install the slim CPU wheel (~200 MB vs ~2 GB CUDA build)
        pip install torch==2.6.0 torchvision==0.21.0 --index-url https://download.pytorch.org/whl/cpu

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Environment Variables & Tokens
      env:
        ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
        TELEGRAM_CONFIG_JSON: ${{ secrets.TELEGRAM_CONFIG_JSON }}
        META_CONFIG_GENERAL_FALLBACK: ${{ secrets.META_CONFIG_GENERAL_FALLBACK }}
        # ── Fashion accounts (add META_CONFIG_FASHION_01 .. _05 as you scale) ──
        META_CONFIG_FASHION_01: ${{ secrets.META_CONFIG_FASHION_01 }}
        META_CONFIG_FASHION_02: ${{ secrets.META_CONFIG_FASHION_02 }}
        META_CONFIG_FASHION_03: ${{ secrets.META_CONFIG_FASHION_03 }}
        META_CONFIG_FASHION_04: ${{ secrets.META_CONFIG_FASHION_04 }}
        META_CONFIG_FASHION_05: ${{ secrets.META_CONFIG_FASHION_05 }}
        # ── Fashion YT tokens (CLIENT_SECRET_JSON_01 .. _05 + TOKEN_JSON_01 .. _05) ──
        CLIENT_SECRET_JSON_01: ${{ secrets.CLIENT_SECRET_JSON_01 }}
        CLIENT_SECRET_JSON_02: ${{ secrets.CLIENT_SECRET_JSON_02 }}
        CLIENT_SECRET_JSON_03: ${{ secrets.CLIENT_SECRET_JSON_03 }}
        TOKEN_JSON_01: ${{ secrets.TOKEN_JSON_01 }}
        TOKEN_JSON_02: ${{ secrets.TOKEN_JSON_02 }}
        TOKEN_JSON_03: ${{ secrets.TOKEN_JSON_03 }}
        # ── NSFW accounts (add META_CONFIG_NSFW_01 .. _05 as you scale) ──
        META_CONFIG_NSFW_01: ${{ secrets.META_CONFIG_NSFW_01 }}
        META_CONFIG_NSFW_02: ${{ secrets.META_CONFIG_NSFW_02 }}
        META_CONFIG_NSFW_03: ${{ secrets.META_CONFIG_NSFW_03 }}
        META_CONFIG_NSFW_04: ${{ secrets.META_CONFIG_NSFW_04 }}
        META_CONFIG_NSFW_05: ${{ secrets.META_CONFIG_NSFW_05 }}
        # ── NSFW YT tokens ──
        CLIENT_SECRET_JSON_ADULT_01: ${{ secrets.CLIENT_SECRET_JSON_ADULT }}
        CLIENT_SECRET_JSON_ADULT_02: ${{ secrets.CLIENT_SECRET_JSON_ADULT_02 }}
        TOKEN_JSON_ADULT_01: ${{ secrets.TOKEN_JSON_ADULT }}
        TOKEN_JSON_ADULT_02: ${{ secrets.TOKEN_JSON_ADULT_02 }}
      run: |
        mkdir -p Credentials

        # ── Main .env ─────────────────────────────────────────────────────────
        if [ -n "$ENV_FILE_CONTENT" ]; then
          echo "$ENV_FILE_CONTENT" > Credentials/.env
        fi

        # ── Telegram config ───────────────────────────────────────────────────
        if [ -n "$TELEGRAM_CONFIG_JSON" ]; then
          echo "$TELEGRAM_CONFIG_JSON" > Credentials/telegram_config.json
        fi

        # ── General Fallback IG ───────────────────────────────────────────────
        if [ -n "$META_CONFIG_GENERAL_FALLBACK" ]; then
          mkdir -p Credentials/social_media/General_Fallback
          echo "$META_CONFIG_GENERAL_FALLBACK" > Credentials/social_media/General_Fallback/meta_config.json
          echo "✅ Injected General_Fallback IG"
        fi

        # ── Fashion accounts (Fashion_01 .. Fashion_05) ───────────────────────
        for n in 01 02 03 04 05; do
          VAR="META_CONFIG_FASHION_${n}"
          VAL="${!VAR}"
          if [ -n "$VAL" ]; then
            mkdir -p "Credentials/social_media/Fashion_${n}"
            echo "$VAL" > "Credentials/social_media/Fashion_${n}/meta_config.json"
            echo "✅ Injected Fashion_${n} IG"
          fi
          # YT client secret
          CS_VAR="CLIENT_SECRET_JSON_${n}"
          CS_VAL="${!CS_VAR}"
          if [ -n "$CS_VAL" ]; then
            mkdir -p "Credentials/social_media/Fashion_${n}"
            echo "$CS_VAL" > "Credentials/social_media/Fashion_${n}/client_secret.json"
            echo "✅ Injected Fashion_${n} YT client_secret"
          fi
          # YT token
          TK_VAR="TOKEN_JSON_${n}"
          TK_VAL="${!TK_VAR}"
          if [ -n "$TK_VAL" ]; then
            mkdir -p "Credentials/social_media/Fashion_${n}"
            echo "$TK_VAL" > "Credentials/social_media/Fashion_${n}/token.json"
            echo "✅ Injected Fashion_${n} YT token"
          fi
        done

        # ── NSFW accounts (NSFW_01 .. NSFW_05) ───────────────────────────────
        for n in 01 02 03 04 05; do
          VAR="META_CONFIG_NSFW_${n}"
          VAL="${!VAR}"
          if [ -n "$VAL" ]; then
            mkdir -p "Credentials/social_media/NSFW_${n}"
            echo "$VAL" > "Credentials/social_media/NSFW_${n}/meta_config.json"
            echo "✅ Injected NSFW_${n} IG"
          fi
          # YT client secret
          CS_VAR="CLIENT_SECRET_JSON_ADULT_${n}"
          CS_VAL="${!CS_VAR}"
          if [ -n "$CS_VAL" ]; then
            mkdir -p "Credentials/social_media/NSFW_${n}"
            echo "$CS_VAL" > "Credentials/social_media/NSFW_${n}/client_secret.json"
            echo "✅ Injected NSFW_${n} YT client_secret"
          fi
          # YT token
          TK_VAR="TOKEN_JSON_ADULT_${n}"
          TK_VAL="${!TK_VAR}"
          if [ -n "$TK_VAL" ]; then
            mkdir -p "Credentials/social_media/NSFW_${n}"
            echo "$TK_VAL" > "Credentials/social_media/NSFW_${n}/token.json"
            echo "✅ Injected NSFW_${n} YT token"
          fi
        done

        # ── CI flags ──────────────────────────────────────────────────────────
        echo "PAPARAZZI_MODE=yes" >> Credentials/.env
        echo "AUTO_PUBLISH_ACTRESS_CLIPS=yes" >> Credentials/.env


    - name: Run AMTCE Engine
      run: |
        python ci_runner.py

    # ── Persist ledger + queue to git after every run (the ONLY reliable method) ──
    # actions/cache is NOT reliable here because its key changes each run.
    # Committing directly to the repo guarantees the next run always sees
    # the updated dedup state, preventing repeated uploads of the same clip.
    - name: Commit Dedup State to Git
      if: always()   # Save even if the run partially fails
      run: |
        git config user.name  "AMTCE Bot"
        git config user.email "amtce-bot@users.noreply.github.com"
        # Stage only the dedup state files (never credentials or videos)
        git add -f Actress_Modules/actress_ledger.json || true
        git add -f Actress_Modules/published_registry.json || true
        git add -f Actress_Modules/apify_cursor.json || true
        git add -f Actress_Modules/account_daily_limits.json || true
        git add -f publish_queue.json || true
        git add -f Intelligence_Data/salesman_state.json || true
        # Only commit if there's something changed
        if git diff --cached --quiet; then
          echo "No dedup state changes to commit."
        else
          git commit -m "ci: update dedup ledger + publish queue [skip ci]"
          git pull --rebase origin main || true
          git push origin HEAD
          echo "Dedup state committed and pushed."
        fi
