name: AMTCE Runner

on:
  workflow_dispatch:  # Manual trigger anytime
  schedule:
    # Run every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'

jobs:
  run-amtce:
    runs-on: ubuntu-latest
    timeout-minutes: 340  # Slightly under 6 hours to avoid overlap
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ── Restore publish_queue.json between runs (state persistence) ──────────
    # Without this, the queue resets every 6 hours and posts are lost.
    - name: Restore Publish Queue State
      uses: actions/cache@v4
      with:
        path: |
          The_json/publish_queue.json
          Actress_Modules/actress_ledger.json
        key: amtce-state-${{ github.run_id }}
        restore-keys: |
          amtce-state-

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y ffmpeg

    - name: Install PyTorch (CPU-only)
      run: |
        # GitHub runners have no GPU — install the slim CPU wheel (~200 MB vs ~2 GB CUDA build)
        pip install torch==2.6.0 torchvision==0.21.0 --index-url https://download.pytorch.org/whl/cpu

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Environment Variables & Tokens
      run: |
        mkdir -p Credentials
        # Securely inject the .env file from GitHub Secrets (supports both ENV_FILE and ENV_FILE_CONTENT)
        if [ -n "${{ secrets.ENV_FILE }}" ]; then
          echo "${{ secrets.ENV_FILE }}" > Credentials/.env
        else
          echo "${{ secrets.ENV_FILE_CONTENT }}" > Credentials/.env
        fi
        # Inject Google client secret and access tokens if configured in Secrets
        if [ -n "${{ secrets.CLIENT_SECRET_JSON }}" ]; then
          echo "${{ secrets.CLIENT_SECRET_JSON }}" > Credentials/client_secret.json
        fi
        if [ -n "${{ secrets.TOKEN_JSON }}" ]; then
          echo "${{ secrets.TOKEN_JSON }}" > Credentials/token.json
        fi
        # Auto-enable paparazzi mode in CI runs
        echo "PAPARAZZI_MODE=yes" >> Credentials/.env

    - name: Run AMTCE Engine
      run: |
        python main.py

    # ── Save updated queue/ledger after run (so next 6hr run picks up) ───────
    - name: Save Publish Queue State
      if: always()   # Save even if the run partially fails
      uses: actions/cache@v4
      with:
        path: |
          The_json/publish_queue.json
          Actress_Modules/actress_ledger.json
        key: amtce-state-${{ github.run_id }}
