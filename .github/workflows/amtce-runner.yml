name: AMTCE Runner

on:
  workflow_dispatch:  # Manual trigger anytime
  schedule:
    # Run every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'

jobs:
  run-amtce:
    runs-on: ubuntu-latest
    timeout-minutes: 340  # Slightly under 6 hours to avoid overlap
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y ffmpeg

    - name: Install PyTorch (CPU-only)
      run: |
        pip install torch==2.6.0 torchvision==0.21.0 --index-url https://download.pytorch.org/whl/cpu

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Environment Variables & Tokens
      env:
        ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
        TELEGRAM_CONFIG_JSON: ${{ secrets.TELEGRAM_CONFIG_JSON }}
        # General Fallback IG (base=META_CONFIG_JSON, then _01, _02...)
        META_CONFIG_GENERAL_FALLBACK: ${{ secrets.META_CONFIG_JSON }}
        META_CONFIG_JSON_01:          ${{ secrets.META_CONFIG_JSON_01 }}
        META_CONFIG_JSON_02:          ${{ secrets.META_CONFIG_JSON_02 }}
        META_CONFIG_JSON_03:          ${{ secrets.META_CONFIG_JSON_03 }}
        META_CONFIG_JSON_04:          ${{ secrets.META_CONFIG_JSON_04 }}
        # Fashion IG accounts (base=index 0, then _01, _02...)
        META_CONFIG_JSON_FASHION:     ${{ secrets.META_CONFIG_JSON_FASHION }}
        META_CONFIG_JSON_FASHION_01:  ${{ secrets.META_CONFIG_JSON_FASHION_01 }}
        META_CONFIG_JSON_FASHION_02:  ${{ secrets.META_CONFIG_JSON_FASHION_02 }}
        META_CONFIG_JSON_FASHION_03:  ${{ secrets.META_CONFIG_JSON_FASHION_03 }}
        META_CONFIG_JSON_FASHION_04:  ${{ secrets.META_CONFIG_JSON_FASHION_04 }}
        # Fashion YT (CLIENT_SECRET_JSON/TOKEN_JSON = index 0)
        CLIENT_SECRET_JSON:           ${{ secrets.CLIENT_SECRET_JSON }}
        TOKEN_JSON:                   ${{ secrets.TOKEN_JSON }}
        CLIENT_SECRET_JSON_01:        ${{ secrets.CLIENT_SECRET_JSON_01 }}
        TOKEN_JSON_01:                ${{ secrets.TOKEN_JSON_01 }}
        CLIENT_SECRET_JSON_02:        ${{ secrets.CLIENT_SECRET_JSON_02 }}
        TOKEN_JSON_02:                ${{ secrets.TOKEN_JSON_02 }}
        # NSFW IG accounts (base=index 0, then _01, _02...)
        META_CONFIG_JSON_NSFW:        ${{ secrets.META_CONFIG_JSON_NSFW }}
        META_CONFIG_JSON_NSFW_01:     ${{ secrets.META_CONFIG_JSON_NSFW_01 }}
        META_CONFIG_JSON_NSFW_02:     ${{ secrets.META_CONFIG_JSON_NSFW_02 }}
        META_CONFIG_JSON_NSFW_03:     ${{ secrets.META_CONFIG_JSON_NSFW_03 }}
        # NSFW YT (CLIENT_SECRET_JSON_ADULT/TOKEN_JSON_ADULT = base)
        CLIENT_SECRET_JSON_ADULT:     ${{ secrets.CLIENT_SECRET_JSON_ADULT }}
        TOKEN_JSON_ADULT:             ${{ secrets.TOKEN_JSON_ADULT }}
        CLIENT_SECRET_JSON_ADULT_01:  ${{ secrets.CLIENT_SECRET_JSON_ADULT_01 }}
        TOKEN_JSON_ADULT_01:          ${{ secrets.TOKEN_JSON_ADULT_01 }}
        CLIENT_SECRET_JSON_ADULT_02:  ${{ secrets.CLIENT_SECRET_JSON_ADULT_02 }}
        TOKEN_JSON_ADULT_02:          ${{ secrets.TOKEN_JSON_ADULT_02 }}
      run: |
        mkdir -p Credentials

        # Main .env
        if [ -n "$ENV_FILE_CONTENT" ]; then
          echo "$ENV_FILE_CONTENT" > Credentials/.env
        fi

        # Telegram config
        if [ -n "$TELEGRAM_CONFIG_JSON" ]; then
          echo "$TELEGRAM_CONFIG_JSON" > Credentials/telegram_config.json
        fi

        # General Fallback IG -- base account
        if [ -n "$META_CONFIG_GENERAL_FALLBACK" ]; then
          mkdir -p Credentials/social_media/General_Fallback
          echo "$META_CONFIG_GENERAL_FALLBACK" > Credentials/social_media/General_Fallback/meta_config.json
          echo "Injected General_Fallback IG"
        fi

        # General Fallback IG -- additional accounts (_01, _02...)
        for n in 01 02 03 04; do
          VAR="META_CONFIG_JSON_${n}"
          VAL="${!VAR}"
          if [ -n "$VAL" ]; then
            mkdir -p "Credentials/social_media/General_Fallback_${n}"
            echo "$VAL" > "Credentials/social_media/General_Fallback_${n}/meta_config.json"
            echo "Injected General_Fallback_${n} IG"
          fi
        done

        # Fashion IG -- base account -> Fashion/
        if [ -n "$META_CONFIG_JSON_FASHION" ]; then
          mkdir -p Credentials/social_media/Fashion
          echo "$META_CONFIG_JSON_FASHION" > Credentials/social_media/Fashion/meta_config.json
          echo "Injected Fashion (base) IG"
        fi
        if [ -n "$CLIENT_SECRET_JSON" ]; then
          mkdir -p Credentials/social_media/Fashion
          echo "$CLIENT_SECRET_JSON" > Credentials/social_media/Fashion/client_secret.json
          echo "Injected Fashion (base) YT client_secret"
        fi
        if [ -n "$TOKEN_JSON" ]; then
          mkdir -p Credentials/social_media/Fashion
          echo "$TOKEN_JSON" > Credentials/social_media/Fashion/token.json
          echo "Injected Fashion (base) YT token"
        fi

        # Fashion IG -- additional accounts (_01, _02...)
        for n in 01 02 03 04; do
          VAR="META_CONFIG_JSON_FASHION_${n}"
          VAL="${!VAR}"
          if [ -n "$VAL" ]; then
            mkdir -p "Credentials/social_media/Fashion_${n}"
            echo "$VAL" > "Credentials/social_media/Fashion_${n}/meta_config.json"
            echo "Injected Fashion_${n} IG"
          fi
          CS_VAR="CLIENT_SECRET_JSON_${n}"
          CS_VAL="${!CS_VAR}"
          if [ -n "$CS_VAL" ]; then
            mkdir -p "Credentials/social_media/Fashion_${n}"
            echo "$CS_VAL" > "Credentials/social_media/Fashion_${n}/client_secret.json"
            echo "Injected Fashion_${n} YT client_secret"
          fi
          TK_VAR="TOKEN_JSON_${n}"
          TK_VAL="${!TK_VAR}"
          if [ -n "$TK_VAL" ]; then
            mkdir -p "Credentials/social_media/Fashion_${n}"
            echo "$TK_VAL" > "Credentials/social_media/Fashion_${n}/token.json"
            echo "Injected Fashion_${n} YT token"
          fi
        done

        # NSFW IG -- base account -> NSFW/
        if [ -n "$META_CONFIG_JSON_NSFW" ]; then
          mkdir -p Credentials/social_media/NSFW
          echo "$META_CONFIG_JSON_NSFW" > Credentials/social_media/NSFW/meta_config.json
          echo "Injected NSFW (base) IG"
        fi
        if [ -n "$CLIENT_SECRET_JSON_ADULT" ]; then
          mkdir -p Credentials/social_media/NSFW
          echo "$CLIENT_SECRET_JSON_ADULT" > Credentials/social_media/NSFW/client_secret.json
          echo "Injected NSFW (base) YT client_secret"
        fi
        if [ -n "$TOKEN_JSON_ADULT" ]; then
          mkdir -p Credentials/social_media/NSFW
          echo "$TOKEN_JSON_ADULT" > Credentials/social_media/NSFW/token.json
          echo "Injected NSFW (base) YT token"
        fi

        # NSFW IG -- additional accounts (_01, _02...)
        for n in 01 02 03; do
          VAR="META_CONFIG_JSON_NSFW_${n}"
          VAL="${!VAR}"
          if [ -n "$VAL" ]; then
            mkdir -p "Credentials/social_media/NSFW_${n}"
            echo "$VAL" > "Credentials/social_media/NSFW_${n}/meta_config.json"
            echo "Injected NSFW_${n} IG"
          fi
          CS_VAR="CLIENT_SECRET_JSON_ADULT_${n}"
          CS_VAL="${!CS_VAR}"
          if [ -n "$CS_VAL" ]; then
            mkdir -p "Credentials/social_media/NSFW_${n}"
            echo "$CS_VAL" > "Credentials/social_media/NSFW_${n}/client_secret.json"
            echo "Injected NSFW_${n} YT client_secret"
          fi
          TK_VAR="TOKEN_JSON_ADULT_${n}"
          TK_VAL="${!TK_VAR}"
          if [ -n "$TK_VAL" ]; then
            mkdir -p "Credentials/social_media/NSFW_${n}"
            echo "$TK_VAL" > "Credentials/social_media/NSFW_${n}/token.json"
            echo "Injected NSFW_${n} YT token"
          fi
        done

        # CI flags
        echo "PAPARAZZI_MODE=yes" >> Credentials/.env
        echo "AUTO_PUBLISH_ACTRESS_CLIPS=yes" >> Credentials/.env


    - name: Run AMTCE Engine
      run: |
        python main.py

    - name: Commit Dedup State to Git
      if: always()
      run: |
        git config user.name  "AMTCE Bot"
        git config user.email "amtce-bot@users.noreply.github.com"
        git add -f Actress_Modules/actress_ledger.json || true
        git add -f Actress_Modules/published_registry.json || true
        git add -f Actress_Modules/apify_cursor.json || true
        git add -f Actress_Modules/account_daily_limits.json || true
        git add -f publish_queue.json || true
        git add -f Intelligence_Data/salesman_state.json || true
        if git diff --cached --quiet; then
          echo "No dedup state changes to commit."
        else
          git commit -m "ci: update dedup ledger + publish queue [skip ci]"
          git pull --rebase origin main || true
          git push origin HEAD
          echo "Dedup state committed and pushed."
        fi
